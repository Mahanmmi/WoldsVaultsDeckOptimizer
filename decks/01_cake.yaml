name: Cake Deck
enabled: true

# `core_slots` is the deck's *base* number of core slots. The global `deckmod`
# from config.yaml is added at load time.
core_slots: 2
n_arcane:   3
min_regular: -1
max_greed:   -1

# Slot layout. `X` (or `x`/`#`) marks an active slot, anything else is empty.
# Absolute row/column indices are arbitrary — only the relative shape matters.
layout: |
  .XXXXXXX.
  .XXXXXXX.
  XXXXXXXXX
